<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jismint Studio | 지스민트 스튜디오</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 설정 */
        :root {
            --bg-color: #121212; /* 고급스러운 다크 그레이 */
            --text-color: #e0e0e0;
            --accent-color: #bb86fc; /* 연한 보라색 포인트 */
            --footer-bg: #1f1f1f;
        }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 헤더 (로고 영역) */
        header {
            padding: 2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-decoration: none;
            letter-spacing: -1px;
        }

        /* 메인 섹션 */
        main {
            flex: 1;
            padding: 4rem 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .studio-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .studio-subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        /* 리비(Libi) 앱 소개 섹션 */
        .app-section {
            background-color: #1f1f1f;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
        }

      .app-logo {
    width: 100px; /* 로고 크기 조정 */
    height: auto;
    border-radius: 20px; /* 로고 모서리 둥글게 */
    display: block;
    margin: 0 auto 1.5rem; /* 중앙 정렬 및 여백 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* 로고에 살짝 그림자 추가 */
}

        .app-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .app-desc {
            font-size: 1rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* 푸터 (사업자 정보 영역) */
        footer {
            background-color: var(--footer-bg);
            padding: 3rem 10%;
            font-size: 0.85rem;
            border-top: 1px solid #333;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .footer-info {
            max-width: 60%;
        }

        .footer-info p {
            margin: 0.3rem 0;
            opacity: 0.7;
        }

        .footer-links a {
            color: var(--text-color);
            text-decoration: none;
            opacity: 0.7;
            margin-left: 1rem;
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        .copyright {
            width: 100%;
            text-align: center;
            margin-top: 2rem;
            opacity: 0.5;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Jismint Studio</a>
    </header>

    <main>
        <h1 class="studio-title">Innovating with AI</h1>
        <p class="studio-subtitle">지스민트 스튜디오는 인공지능 기술을 통해 새로운 가치를 창출합니다.</p>
        
        <div class="app-section">
            <img src="logo.png" alt="Libi Logo" class="app-logo">
            <h2 class="app-name">리비 (Libi)</h2>
            <p class="app-desc">사주와 AI의 만남, 당신의 운명을 새롭게 해석하는 인공지능 사주 서비스.</p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <strong>지스민트 스튜디오 (Jismint Studio)</strong>
                <p>대표: 지윤진 | 사업자등록번호: 168-61-00933</p>
                <p>통신판매업신고: 제 20260318 호 (성남시청)</p>
            
            </div>
            <div class="footer-links">
                <a href="#">개인정보처리방침</a>
                <a href="mailto:admin@jismintstudio.com">문의하기</a>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 Jismint Studio. All rights reserved.
        </div>
    </footer>

</body>
</html>
