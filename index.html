<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jismint Studio | 지스민트 스튜디오</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --footer-bg: #1f1f1f;
        }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        header { padding: 2rem 10%; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent-color); text-decoration: none; }

        main {
            flex: 1;
            padding: 4rem 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .studio-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .studio-subtitle { font-size: 1.2rem; font-weight: 300; margin-bottom: 3rem; opacity: 0.8; }

        .app-section {
            background-color: #1f1f1f;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }

        .app-logo {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            display: block;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .app-name { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .app-desc { font-size: 1.1rem; font-weight: 300; opacity: 0.8; margin-bottom: 2.5rem; }

        .store-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            flex-wrap: wrap; 
            align-items: center;
        }

        .store-badge {
            height: 40px; /* 애플 기준 높이 */
            width: auto;
            transition: 0.3s;
            filter: grayscale(100%);
            opacity: 0.3;
            cursor: not-allowed;
            vertical-align: middle;
        }


        img[alt="Google Play"] {
            height: 58px;
            margin-left: -5px;
        }

        footer {
            background-color: var(--footer-bg);
            padding: 3rem 10%;
            font-size: 0.85rem;
            border-top: 1px solid #333;
        }

        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 2rem; }
        .footer-info p { margin: 0.3rem 0; opacity: 0.7; }
        
        .footer-links { display: flex; gap: 1.5rem; }
        .footer-links a {
            color: var(--text-color);
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }
        .footer-links a:hover { opacity: 1; color: var(--accent-color); }
        .copyright { width: 100%; text-align: center; margin-top: 2rem; opacity: 0.5; }
    </style>
</head>
<body>

    <header><a href="#" class="logo">Jismint Studio</a></header>

    <main>
        <h1 class="studio-title">Innovating with AI</h1>
        <p class="studio-subtitle">지스민트 스튜디오는 인공지능 기술을 통해 새로운 가치를 창출합니다.</p>
        
        <div class="app-section">
            <img src="logo.png" alt="Libi Logo" class="app-logo">
            <h2 class="app-name">리비 (Libi)</h2>
            <p class="app-desc">사주와 AI의 만남, 당신의 운명을 새롭게 해석하는 인공지능 사주 서비스.</p>
            
            <div class="store-buttons">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ko-kr?size=250x83" alt="App Store" class="store-badge">
                <img src="https://play.google.com/intl/en_us/badges/images/generic/ko_badge_web_generic.png" alt="Google Play" class="store-badge">
            </div>
            <p style="font-size: 0.8rem; color: #555; margin-top: 15px;">(스토어 출시 준비 중)</p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <strong>지스민트 스튜디오 (Jismint Studio)</strong>
                <p>대표: 지윤진 | 사업자등록번호: 168-61-00933</p>
                <p>통신판매업신고: 제 20260318 호</p>
            </div>
            <div class="footer-links">
                <a href="https://libi-fortune.notion.site/LIBI-Privacy-Policy-30d74b7c91b180b991b2fba242f02905" target="_blank">개인정보처리방침</a>
                <a href="https://libi-fortune.notion.site/LIBI-Terms-of-Service-31974b7c91b18049b713c33c76a41562" target="_blank">이용약관</a>
                <a href="mailto:talk2you.official@gmail.com">문의하기</a>
            </div>
        </div>
        <div class="copyright">&copy; 2026 Jismint Studio. All rights reserved.</div>
    </footer>

</body>
</html>
